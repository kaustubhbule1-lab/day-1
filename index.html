<html>
    <body>
<h2>REGESTRATION FORM</h2>


       <center> <form action="#" method="post" enctype="multipart/formdata"></form>
        Full Name :
        <input type="text" name="fullname" placeholder="enter your full name">
        <br><br>



        <passward>
            PASSWARD :
        <input type="passward" name="passward" minilength="6"required>
        </passward>
        <br><br>



        <email>
            EMAIL
            <input type="email" name="email" required>
        </email>
        <br><br>


        <number>
            MOBILE NUMBER:
            <input type="number" name="number" placeholder="10 digits">
        </number>
        <br><br>

        <range>
            SATISFACTION LEVEL :
            <input type range="range" name="range" min="0" max="10">
            </range>
         <br><br>


          <gender>
            GENDER :
            <input type="ratio" name="gender" value="male">
            <input type="ratio" name="gender" value="female">
            <input type="ratio" name="gender" value="other">
        </gender>
        <br><br>


          <city>
            CITY :
            <slect NAME="city">
            <option value="pune"></option>
                <option value="mumbai"></option>
                <option value="nagpur"></option></slect>
          </city>
          <br><br>



<multiselect-dropdown>
    SUBJECT [SELECT MULTIPLE] :
    <select name="subject" multiple >
        <option value="maths"> Mathematics</option>
        <option value="physics">physics</option>
        <option value="chemistry">chemistry</option>
        <option value="computer">computer</option>
</multiselect-dropdown>
<br><br>

<file-upload>
    UPLOAD PROFILE PICTURE :
    <input type="file" name="profile" accept="image/*">
    <br><br>
</file-upload>
<buttons>
    <input type="submit" value="submit">
    <input type="reset" value="reset">
</buttons>



    </body>
</html>
